<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatalystOS — Skill Runner</title>
<style>
  :root{--void:#0a0a0a;--card:#111;--border:#1e1e1e;--forge:#ff6a00;--off:#f0ede6;--dim:#888;--green:#22c55e;--amber:#f59e0b}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--void);color:var(--off);font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:14px;line-height:1.6}
  header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .brand{font-weight:700;letter-spacing:2px}.brand b{color:var(--forge)}
  .brainpill{font-size:12px;padding:4px 12px;border:1px solid var(--border);border-radius:20px}
  .brainpill.live{color:var(--green);border-color:#22c55e55}.brainpill.dry{color:var(--amber);border-color:#f59e0b55}
  .wrap{display:grid;grid-template-columns:320px 1fr;gap:0;min-height:calc(100vh - 62px)}
  .side{border-right:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 62px)}
  .side h3{font-size:10px;letter-spacing:2px;color:var(--forge);text-transform:uppercase;margin:18px 0 8px}
  .item{padding:7px 10px;border:1px solid var(--border);margin-bottom:5px;cursor:pointer;border-radius:3px;font-size:12px;transition:.15s;display:flex;justify-content:space-between;gap:8px}
  .item:hover{border-color:var(--forge);background:#141414}
  .item.stack{border-left:2px solid var(--forge)}
  .item .cat{color:var(--dim);font-size:10px}
  .main{padding:24px;overflow-y:auto;max-height:calc(100vh - 62px)}
  .title{font-size:18px;font-weight:700;margin-bottom:4px}
  .sub{color:var(--dim);font-size:12px;margin-bottom:16px}
  textarea{width:100%;min-height:120px;background:#0d0d0d;border:1px solid var(--border);color:var(--off);padding:12px;font-family:inherit;font-size:13px;outline:none;border-radius:3px;resize:vertical}
  textarea:focus{border-color:var(--forge)}
  .runbtn{margin-top:12px;background:var(--forge);color:#000;border:none;padding:11px 22px;font-family:inherit;font-weight:700;letter-spacing:1px;cursor:pointer;border-radius:3px}
  .runbtn:disabled{opacity:.5;cursor:wait}
  .out{margin-top:20px;background:#0d0d0d;border:1px solid var(--border);border-radius:3px;padding:16px;white-space:pre-wrap;font-size:12.5px;line-height:1.7;color:#cfe;overflow-x:auto}
  .out.dry{color:var(--amber)}
  .step{border:1px solid var(--border);border-left:2px solid var(--forge);margin-bottom:10px;border-radius:3px}
  .step h4{font-size:11px;color:var(--forge);padding:8px 12px;border-bottom:1px solid var(--border);letter-spacing:1px}
  .step .body{padding:12px;white-space:pre-wrap;font-size:12px;color:#cfe}
  .empty{color:var(--dim);margin-top:40px;text-align:center}
  .hint{margin-top:14px;font-size:11px;color:var(--dim);border-left:2px solid var(--border);padding-left:10px}
  a{color:var(--forge)}
</style>

<header>
  <div class="brand">CATALYST<b>OS</b> · SKILL RUNNER</div>
  <div id="brain" class="brainpill">brain: …</div>
</header>

<div class="wrap">
  <div class="side">
    <input id="filter" placeholder="filter…" style="width:100%;background:#0d0d0d;border:1px solid var(--border);color:var(--off);padding:8px 10px;font-family:inherit;font-size:12px;outline:none;border-radius:3px">
    <div id="stacks"></div>
    <div id="skills"></div>
  </div>
  <div class="main" id="main">
    <div class="empty">← pick a skill or a stack, drop your input, hit Run.</div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let SEL = null; // {type:'skill'|'stack', id}

async function boot(){
  // brain status
  try{
    const st = await (await fetch('/status')).json();
    const m = st.skills_engine || {};
    const pill = $('#brain');
    if(m.can_run){ pill.className='brainpill live'; pill.textContent='brain: LIVE ('+m.brain_model+')'; }
    else { pill.className='brainpill dry'; pill.textContent='brain: DRY-RUN (set CATALYST_LLM_KEY)'; }
  }catch(e){ $('#brain').textContent='brain: ?'; }

  const data = await (await fetch('/api/skills')).json();
  // stacks
  const st = $('#stacks'); st.innerHTML='<h3>Stacks (chains)</h3>';
  data.stacks.forEach(name=>{
    const d=document.createElement('div'); d.className='item stack'; d.dataset.k='stack:'+name;
    d.innerHTML=`<span>⛓ ${name}</span>`; d.onclick=()=>selStack(name); st.appendChild(d);
  });
  // skills by category
  const sk = $('#skills'); sk.innerHTML='<h3>Skills</h3>';
  Object.entries(data.categories).forEach(([cat,ids])=>{
    ids.forEach(id=>{
      const d=document.createElement('div'); d.className='item'; d.dataset.k='skill:'+id+' '+cat;
      d.innerHTML=`<span>${id}</span><span class="cat">${cat}</span>`; d.onclick=()=>selSkill(id); sk.appendChild(d);
    });
  });
  $('#filter').oninput=e=>{
    const q=e.target.value.toLowerCase();
    document.querySelectorAll('.item').forEach(el=>{el.style.display=el.dataset.k.toLowerCase().includes(q)?'flex':'none';});
  };
}

function panel(title, sub){
  $('#main').innerHTML =
   `<div class="title">${title}</div><div class="sub">${sub}</div>
    <textarea id="inp" placeholder="Paste your input — a voice-note transcript, a brief, a topic…"></textarea>
    <button class="runbtn" id="run">▶ RUN</button>
    <div id="result"></div>`;
  $('#run').onclick=go;
}
function selSkill(id){ SEL={type:'skill',id}; panel(id, 'Runs this one skill on your input.'); }
function selStack(name){ SEL={type:'stack',id:name}; panel('⛓ '+name, 'Runs the stack as a chain — each skill’s output feeds the next.'); }

async function go(){
  const inp=$('#inp').value.trim(); if(!inp) return;
  const btn=$('#run'); btn.disabled=true; btn.textContent='RUNNING…';
  const url = SEL.type==='skill' ? `/api/skills/${SEL.id}/run` : `/api/skills/stack/${SEL.id}/run`;
  try{
    const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({input:inp})});
    const j = await r.json();
    render(j);
  }catch(e){ $('#result').innerHTML=`<div class="out">error: ${e}</div>`; }
  btn.disabled=false; btn.textContent='▶ RUN';
}

function render(j){
  const res=$('#result');
  // stack (chain) response
  if(j.steps){
    res.innerHTML = j.steps.map(s=>{
      const rr=s.result||{};
      const body = rr.executed ? rr.output : (rr.reason ? '(dry-run) '+rr.reason : JSON.stringify(rr));
      return `<div class="step"><h4>▹ ${s.skill}</h4><div class="body">${esc(body)}</div></div>`;
    }).join('') + `<div class="hint">final output is the last step above.</div>`;
    return;
  }
  // single skill response
  if(j.executed){ res.innerHTML=`<div class="out">${esc(j.output)}</div>`; }
  else {
    res.innerHTML=`<div class="out dry">DRY-RUN — no brain key set.\n\nwould POST to: ${esc(j.would_send?.endpoint||'')}\nmodel: ${esc(j.would_send?.model||'')}\nsystem prompt: ${j.would_send?.system_prompt_chars||0} chars (the skill body)\nyour input: ${esc(j.would_send?.user_input||'')}</div>
    <div class="hint">Add <b>CATALYST_LLM_KEY</b> to <b>.env</b> and this same click returns a real draft.</div>`;
  }
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
boot();
</script>
